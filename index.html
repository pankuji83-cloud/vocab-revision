<!DOCTYPE html>
<html>
<head>
<title>Vocab Pro MAX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
}

.dark{
  background:#121212;
  color:white;
}

.container{
  max-width:500px;
  margin:20px auto;
  padding:20px;
}

.box{
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  background:#eee;
}

.dark .box{
  background:#1e1e1e;
}

button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>

</head>

<body>

<div class="container">

<h1>📘 Vocab Pro</h1>

<!-- LOGIN PAGE -->
<div id="loginPage">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- APP PAGE -->
<div id="appPage" class="hidden">

<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>

<h3 id="user"></h3>

<!-- Preference -->
<select id="mode">
<option value="word">Word</option>
<option value="idiom">Idiom</option>
<option value="phrasal">Phrasal Verb</option>
</select>

<!-- Add -->
<input id="wordInput" placeholder="Enter word">
<select id="lang">
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>

<button onclick="addWord()">Add</button>

<!-- Meaning -->
<div class="box" id="meaningBox"></div>

<!-- Revision -->
<div class="box" id="output"></div>
<button onclick="toggleRevision()">⏯ Revision</button>

<!-- Quiz -->
<div class="box" id="quizBox"></div>
<button onclick="toggleQuiz()">⏯ Quiz</button>

</div>

</div>

<script>

// CONFIG
firebase.initializeApp({
  apiKey:"AIzaSyAdcQ1cKoy-bvyXpfLI89p7AjJNztJ6bKs",
  authDomain:"vocab-revision-a9f9e.firebaseapp.com",
  projectId:"vocab-revision-a9f9e"
});

const auth = firebase.auth();
const db = firebase.firestore();

let userId="";
let allWords=[];
let revIndex=0;
let currentWord=null;
let currentAnswer="";

let revInterval=null;
let quizInterval=null;

// AUTH FIX
auth.onAuthStateChanged(u=>{
  if(u){
    userId=u.uid;
    user.innerText="Logged: "+u.email;
    loginPage.classList.add("hidden");
    appPage.classList.remove("hidden");
    loadWords();
  }else{
    loginPage.classList.remove("hidden");
    appPage.classList.add("hidden");
  }
});

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){
  auth.signOut();
}

// ADD WORD
async function addWord(){

  let word=wordInput.value.trim().toLowerCase();
  if(!word) return alert("Enter word");

  let res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
  let data=await res.json();

  if(!data[0]) return alert("Invalid");

  let meaning=data[0].meanings[0].definitions[0].definition;
  let example=data[0].meanings[0].definitions[0].example||"";

  let lang=langSelect();
  let t=await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|${lang}`);
  let td=await t.json();
  let trans=td.responseData.translatedText;

  await db.collection("users").doc(userId).collection("words").add({
    word,meaning,example,trans,level:0
  });

  wordInput.value=""; // FIX 1

  meaningBox.innerText=`${cap(word)}
${meaning}
${trans}`;

  speak(word);

  loadWords();
}

// LOAD
async function loadWords(){

  let snap=await db.collection("users").doc(userId).collection("words").get();

  allWords=[];
  snap.forEach(d=>{
    allWords.push({...d.data(),id:d.id});
  });

  allWords.sort((a,b)=>(a.level||0)-(b.level||0)||a.word.localeCompare(b.word));

  showRevision();
  generateQuiz();
}

// REVISION
function showRevision(){

  if(!allWords.length) return output.innerText="No words";

  let text="";

  for(let i=0;i<4;i++){
    let w=allWords[(revIndex+i)%allWords.length];

    text+=`${cap(w.word)}
${w.meaning}
${w.trans}

------\n`;
  }

  output.innerText=text;
}

function nextRevision(){
  revIndex=(revIndex+4)%allWords.length;
  showRevision();
}

// QUIZ
function generateQuiz(){

  if(allWords.length<4){
    quizBox.innerText="Add 4 words";
    return;
  }

  let pool=[...allWords].sort((a,b)=>(a.level||0)-(b.level||0));
  currentWord=pool[Math.floor(Math.random()*5)];

  currentAnswer=currentWord.meaning;

  let opts=[currentAnswer];

  while(opts.length<4){
    let r=allWords[Math.floor(Math.random()*allWords.length)].meaning;
    if(!opts.includes(r)) opts.push(r);
  }

  opts.sort(()=>Math.random()-0.5);

  let html=`<h3>${cap(currentWord.word)}</h3>`;

  opts.forEach(o=>{
    html+=`<button onclick="checkAnswer('${o.replace(/'/g,"")}')">${o}</button>`;
  });

  quizBox.innerHTML=html;
}

// CHECK
async function checkAnswer(ans){

  let lvl=currentWord.level||0;

  if(ans===currentAnswer){
    lvl=Math.min(lvl+1,4);
  }else{
    lvl=Math.max(lvl-1,0);
  }

  await db.collection("users").doc(userId)
    .collection("words").doc(currentWord.id)
    .update({level:lvl});

  loadWords();
}

// PLAY PAUSE
function toggleRevision(){
  if(revInterval){
    clearInterval(revInterval);
    revInterval=null;
  }else{
    revInterval=setInterval(nextRevision,10000);
  }
}

function toggleQuiz(){
  if(quizInterval){
    clearInterval(quizInterval);
    quizInterval=null;
  }else{
    quizInterval=setInterval(generateQuiz,15000);
  }
}

// HELPERS
function cap(w){
  return w.charAt(0).toUpperCase()+w.slice(1);
}

function speak(word){
  let u=new SpeechSynthesisUtterance(word);
  speechSynthesis.speak(u);
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function langSelect(){
  return document.getElementById("lang").value;
}

</script>

</body>
</html>
