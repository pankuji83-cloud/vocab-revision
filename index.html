<!DOCTYPE html>
<html>

<!-- ===================== [A1] HEAD ===================== -->
<head>
<title>Vocab Pro MAX+ 🔥</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ===================== [A2] CSS ===================== -->
<style>


/* SPLASH SCREEN */
#splashScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#splashScreen h1{
  font-size:28px;
  margin-bottom:10px;
}

#splashScreen p{
  opacity:0.8;
}

*{ box-sizing:border-box; }

body{




  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  color:white;
  transition:.3s;
}

.dark{ background:#0f0f0f; }

.container{
  max-width:420px;
  margin:20px auto;
  padding:15px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.box{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:15px;
  margin-top:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background: linear-gradient(45deg,#ff7a18,#ffb347);
}

#revBtn,#quizBtn{
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
}

.progress{
  height:10px;
  background:#444;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress div{
  height:100%;
  background: linear-gradient(90deg,#00ff9d,#00c3ff);
  width:0%;
}

.hidden{ display:none; }

</style>
</head>

<!-- ===================== [B1] BODY ===================== -->
<body>

<!-- ===================== [S1] SPLASH SCREEN ===================== -->
<div id="splashScreen">
  <h1>📘 Vocab Pro MAX+</h1>
  <p>Loading...</p>
</div>



<div class="container">

<h1>📘 Vocab Pro MAX+</h1>

<!-- ===================== [B2] LOGIN UI ===================== -->
<div id="loginPage">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- ===================== [B3] APP UI ===================== -->
<div id="appPage" class="hidden">

<button onclick="logout()">Logout</button>
<button onclick="toggleDark()">🌙 Dark</button>

<h3 id="user"></h3>

<h4 id="streak">🔥 Streak: 0</h4>
<h4 id="xp">⭐ XP: 0</h4>

<div class="progress"><div id="progressBar"></div></div>

<select id="mode" onchange="loadWords()">
<option value="word">Word</option>
<option value="idiom">Idiom</option>
<option value="phrasal">Phrasal</option>
</select>

<!-- 🆕 REVISION MODE -->




<input id="wordInput" placeholder="Enter">

<select id="lang">
<option value="hi">Hindi</option>
<option value="pa">Punjabi</option>
<option value="bn">Bengali</option>
<option value="gu">Gujarati</option>
<option value="mr">Marathi</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="ur">Urdu</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>

<button onclick="addWord()">Add</button>

<div class="box" id="meaningBox"></div>

<div class="box" id="output"></div>

<h4>📚 Revision Mode</h4>
<select id="revMode" onchange="changeRevisionMode()">
<option value="alpha">🔤 Alphabet Order</option>
<option value="anki">🧠 Anki System</option>
<option value="input">🕒 Input Order</option>
</select>

<button id="revBtn" onclick="toggleRevision()">▶ Start Revision</button>

<div class="box" id="quizBox"></div>
<button id="quizBtn" onclick="toggleQuiz()">▶ Start Quiz</button>

<!-- BACKUP -->
<button onclick="setBackupFrequency('daily')">📅 Daily Backup</button>
<button onclick="setBackupFrequency('weekly')">📆 Weekly Backup</button>
<button onclick="setBackupFrequency('monthly')">🗓 Monthly Backup</button>

<button onclick="restoreLatestBackup()">🔄 Restore</button>
<button onclick="showBackupHistory()">📊 History</button>

</div>
</div>

<!-- ===================== [C1] SCRIPT START ===================== -->
<script>

//////////////////////////////////////////////////////////////
// [C2] FIREBASE INIT
//////////////////////////////////////////////////////////////
firebase.initializeApp({
 apiKey:"AIzaSyAdcQ1cKoy-bvyXpfLI89p7AjJNztJ6bKs",
 authDomain:"vocab-revision-a9f9e.firebaseapp.com",
 projectId:"vocab-revision-a9f9e"
});

const auth=firebase.auth();
const db=firebase.firestore();

//////////////////////////////////////////////////////////////
// [C3] GLOBAL STATE
//////////////////////////////////////////////////////////////
let userId="";
let revisionMode = "anki";
let allWords=[];
let revIndex=0;
let currentWord=null;
let currentAnswer="";
let revInt=null;
let quizRunning=false;

let backupFrequency = localStorage.getItem("backup_freq") || "daily";
let lastBackupTime = Number(localStorage.getItem("last_backup")) || 0;
let backupIntervalStarted = false;

let xp=Number(localStorage.getItem("xp"))||0;
let streak=Number(localStorage.getItem("streak"))||0;
let lastDate=localStorage.getItem("lastDate")||"";

//////////////////////////////////////////////////////////////
// [C4] AUTH SYSTEM
//////////////////////////////////////////////////////////////
auth.onAuthStateChanged(u=>{

 // 🔥 SPLASH HIDE AFTER LOAD
 setTimeout(()=>{
   document.getElementById("splashScreen").style.display="none";
 },1500);


 if(u){
  userId=u.uid;
  document.getElementById("user").innerText="Logged: "+u.email;

  loginPage.classList.add("hidden");
  appPage.classList.remove("hidden");

  updateStreak();
  updateXP();
  loadWords();

  if(!backupIntervalStarted){
    setInterval(autoBackup,60000);
    backupIntervalStarted=true;
  }

 }else{
  loginPage.classList.remove("hidden");
  appPage.classList.add("hidden");
 }
});

function signup(){auth.createUserWithEmailAndPassword(email.value,password.value);}
function login(){auth.signInWithEmailAndPassword(email.value,password.value);}
function logout(){auth.signOut();}

//////////////////////////////////////////////////////////////
// [C5] STREAK + XP
//////////////////////////////////////////////////////////////
function updateStreak(){
 let today=new Date().toDateString();
 if(lastDate!==today){
  if(lastDate===new Date(Date.now()-86400000).toDateString()){
    streak++;
  }else{
    streak=1;
  }
  lastDate=today;
 }
 localStorage.setItem("streak",streak);
 localStorage.setItem("lastDate",lastDate);
 document.getElementById("streak").innerText="🔥 Streak: "+streak;
}

function updateXP(){
 if(xp<0) xp=0;
 localStorage.setItem("xp",xp);
 document.getElementById("xp").innerText="⭐ XP: "+xp;
}

//////////////////////////////////////////////////////////////
// [C6] ADD WORD
//////////////////////////////////////////////////////////////
async function addWord(){ 
 let word=wordInput.value.trim().toLowerCase().replace(/[^a-z\s]/g,"");
 if(!word) return alert("Enter word");

 let mode=document.getElementById("mode").value;

 let existing=await db.collection("users").doc(userId)
 .collection("words").where("word","==",word).get();

 if(!existing.empty) return alert("Already exists");

 // 📘 DICTIONARY API
 let meaning="No meaning";
 try{
  let res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
  let data=await res.json();

  if(data[0] && data[0].meanings){
    meaning=data[0].meanings[0].definitions[0].definition;
  }
 }catch(e){
  console.log("Meaning error",e);
 }

 // 🌐 TRANSLATION
 let lang=document.getElementById("lang").value;
 let trans = "Translation not available";

 try{
  let t=await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|${lang}`);
  let td=await t.json();

  if(td.responseData && td.responseData.translatedText){
    trans = td.responseData.translatedText;
  }
 }catch(e){
  console.log("Translation error", e);
 }

 // 🔥 SAVE TO FIREBASE
 await db.collection("users").doc(userId).collection("words").add({
  word,
  meaning,
  trans,
  mode,
  level:0,
  createdAt: Date.now()   // 🆕 IMPORTANT (input order ke liye)
 });

 // UI UPDATE
 wordInput.value="";
 meaningBox.innerText=`${cap(word)}\n${meaning}\n${trans}`;

 loadWords();

 if(!revInt) toggleRevision();
 if(!quizRunning) toggleQuiz();
}


//////////////////////////////////////////////////////////////
// [C7] LOAD + PROGRESS
//////////////////////////////////////////////////////////////
async function loadWords(){
 let mode=document.getElementById("mode").value;

 let snap=await db.collection("users").doc(userId)
  .collection("words").where("mode","==",mode).get();

 allWords=[];
 snap.forEach(d=>allWords.push({...d.data(),id:d.id}));

 updateProgress();
 showRevision();
 generateQuiz();
}

function updateProgress(){
 let strong=allWords.filter(w=>w.level>=3).length;
 let percent=allWords.length?(strong/allWords.length)*100:0;
 document.getElementById("progressBar").style.width=percent+"%";
}

//////////////////////////////////////////////////////////////
// [C8] REVISION SYSTEM
//////////////////////////////////////////////////////////////

function changeRevisionMode(){
 revisionMode = document.getElementById("revMode").value;
 showRevision();
}

function showRevision(){
 if(!allWords.length){
  output.innerText="No words";
  return;
 }

 let sorted = [];

 // 🔤 ALPHABET MODE (DEFAULT)
  if(revisionMode==="alpha"){
  sorted=[...allWords].sort((a,b)=>a.word.localeCompare(b.word));

 }

 //   🧠 ANKI MODE 
 else if(revisionMode==="anki"){
  sorted=[...allWords].sort((a,b)=>(a.level||0)-(b.level||0));

 }

// 🕒 INPUT ORDER (FIXED)
else{
  sorted=[...allWords].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}

 let t="";
 for(let i=0;i<Math.min(4,sorted.length);i++){
  let w=sorted[(revIndex+i)%sorted.length];
  t+=`${cap(w.word)}\n${w.meaning}\n${w.trans}\n\n`;
 }

 output.innerText=t;
}


function nextRevision(){
 revIndex=(revIndex+4)%allWords.length;
 showRevision();
}

//////////////////////////////////////////////////////////////
// [C9] QUIZ SYSTEM
//////////////////////////////////////////////////////////////
function generateQuiz(){
 if(!quizRunning) return;

 if(allWords.length<4){
  quizBox.innerText="Add at least 4 items";
  return;
 }

 let pool=[...allWords].sort((a,b)=>(a.level||0)-(b.level||0));
 currentWord=pool[Math.floor(Math.random()*Math.min(5,pool.length))];
 currentAnswer=currentWord.meaning;

 let opts=[currentAnswer];

 while(opts.length<4){
  let r=allWords[Math.floor(Math.random()*allWords.length)].meaning;
  if(!opts.includes(r)) opts.push(r);
 }

 opts.sort(()=>Math.random()-0.5);

 let html=`<h3>${cap(currentWord.word)}</h3>`;

 opts.forEach(o=>{
  html+=`<button onclick="checkAnswer('${o.replace(/'/g,"")}')">${o}</button>`;
 });

 quizBox.innerHTML=html;
}

async function checkAnswer(ans){
 let lvl=currentWord.level||0;

 if(ans===currentAnswer){
  alert("✅ Correct");
  xp+=10;
  lvl=Math.min(lvl+1,5);
 }else{
  alert("❌ Wrong");
  xp-=5;
  lvl=Math.max(lvl-1,0);
 }

 updateXP();

 await db.collection("users").doc(userId)
  .collection("words").doc(currentWord.id)
  .update({level:lvl});

 loadWords();
}

//////////////////////////////////////////////////////////////
// [C10] PLAY CONTROLS
//////////////////////////////////////////////////////////////
function toggleRevision(){
 let btn=document.getElementById("revBtn");

 if(revInt){
  clearInterval(revInt);
  revInt=null;
  btn.innerText="▶ Start Revision";
 }else{
  revInt=setInterval(nextRevision,10000);
  btn.innerText="⏸ Pause Revision";
 }
}

function toggleQuiz(){
 let btn=document.getElementById("quizBtn");

 quizRunning=!quizRunning;

 if(quizRunning){
  generateQuiz();
  btn.innerText="⏸ Pause Quiz";
 }else{
  btn.innerText="▶ Start Quiz";
 }
}

//////////////////////////////////////////////////////////////
// [C11] BACKUP SYSTEM
//////////////////////////////////////////////////////////////
function setBackupFrequency(freq){
 backupFrequency=freq;
 localStorage.setItem("backup_freq",freq);
 alert("Backup set: "+freq);
}

function shouldBackup(){
 let diff=Date.now()-lastBackupTime;

 if(backupFrequency==="daily" && diff>86400000) return true;
 if(backupFrequency==="weekly" && diff>604800000) return true;
 if(backupFrequency==="monthly" && diff>2592000000) return true;

 return false;
}

async function autoBackup(){
 if(!shouldBackup()) return;

 let snap=await db.collection("users").doc(userId).collection("words").get();

 let data=[];
 snap.forEach(d=>data.push(d.data()));

 if(!data.length) return;

 await db.collection("users").doc(userId)
  .collection("backups").add({data,date:Date.now()});

 lastBackupTime=Date.now();
 localStorage.setItem("last_backup",lastBackupTime);
}

//////////////////////////////////////////////////////////////
// [C12] HELPERS
//////////////////////////////////////////////////////////////
function cap(w){return w.charAt(0).toUpperCase()+w.slice(1);}
function toggleDark(){document.body.classList.toggle("dark");}

</script>
</body>
</html>
