<!DOCTYPE html>
<html>
<head>
  <title>Vocab Revision Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    .box {
      background: #f4f6f8;
      padding: 10px;
      border-radius: 10px;
      margin-top: 15px;
      white-space: pre-line;
    }

    .quiz button {
      background: #28a745;
    }

    .quiz button:hover {
      background: #1e7e34;
    }

    .level {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">

<h1>📘 Vocab Revision</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h3 id="user">Not logged in</h3>

<!-- ADD WORD -->
<input id="wordInput" placeholder="Enter word">
<button onclick="addWord()">Add Word</button>

<!-- OUTPUT -->
<div class="box" id="output">No words yet</div>

<!-- QUIZ -->
<div class="box quiz" id="quizBox"></div>

</div>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAdcQ1cKoy-bvyXpfLI89p7AjJNztJ6bKs",
  authDomain: "vocab-revision-a9f9e.firebaseapp.com",
  projectId: "vocab-revision-a9f9e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId = "";
let allWords = [];
let revIndex = 0;
let currentWord = null;
let currentAnswer = "";

// AUTH
function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(() => alert("Signup success"))
    .catch(e => alert(e.message));
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(() => alert("Login success"))
    .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    userId = user.uid;
    user.innerText = "Logged in: " + user.email;
    loadWords();
  } else {
    userId = "";
    document.getElementById("user").innerText = "Not logged in";
  }
});

// ADD WORD
async function addWord() {

  if (!userId) return alert("Login first!");

  let word = wordInput.value.trim().toLowerCase();
  if (!word) return alert("Enter word");

  let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
  let data = await res.json();

  if (!data[0]) return alert("Invalid word");

  let meaning = data[0].meanings[0].definitions[0].definition;
  let example = data[0].meanings[0].definitions[0].example || "No example";

  let trans = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|hi`);
  let tdata = await trans.json();
  let hindi = tdata.responseData.translatedText;

  await db.collection("users").doc(userId).collection("words").add({
    word, meaning, example, hindi, level: 0
  });

  loadWords();
}

// LOAD
async function loadWords() {

  let snap = await db.collection("users").doc(userId).collection("words").get();

  allWords = [];
  snap.forEach(doc => {
    allWords.push({ ...doc.data(), id: doc.id });
  });

  allWords.sort((a,b)=>(a.level||0)-(b.level||0)||a.word.localeCompare(b.word));

  showRevision();
  generateQuiz();
}

// REVISION UI
function showRevision() {

  if (!allWords.length) {
    output.innerText = "No words yet";
    return;
  }

  let text = "";

  for (let i=0;i<Math.min(4,allWords.length);i++) {
    let w = allWords[(revIndex+i)%allWords.length];

    text += `${w.word} (Level ${w.level})
${w.meaning}
${w.hindi}
${w.example}

------\n`;
  }

  output.innerText = text;
}

function nextRevision() {
  revIndex = (revIndex + 4) % allWords.length;
  showRevision();
}

// QUIZ
function generateQuiz() {

  if (allWords.length < 4) {
    quizBox.innerText = "Add 4 words";
    return;
  }

  let pool = [...allWords].sort((a,b)=>(a.level||0)-(b.level||0));
  currentWord = pool[Math.floor(Math.random()*Math.min(5,pool.length))];

  currentAnswer = currentWord.meaning;

  let options = [currentAnswer];

  while(options.length<4){
    let r = allWords[Math.floor(Math.random()*allWords.length)].meaning;
    if(!options.includes(r)) options.push(r);
  }

  options.sort(()=>Math.random()-0.5);

  let html = `<h3>${currentWord.word}</h3>`;

  options.forEach(opt=>{
    html+=`<button onclick="checkAnswer('${opt.replace(/'/g,"")}')">${opt}</button>`;
  });

  quizBox.innerHTML = html;
}

// CHECK
async function checkAnswer(ans) {

  let newLevel = currentWord.level || 0;

  if(ans===currentAnswer){
    alert("✅");
    newLevel = Math.min(newLevel+1,4);
  } else {
    alert("❌");
    newLevel = Math.max(newLevel-1,0);
  }

  await db.collection("users").doc(userId)
    .collection("words").doc(currentWord.id)
    .update({level:newLevel});

  loadWords();
}

// AUTO
setInterval(nextRevision,10000);
setInterval(generateQuiz,15000);

</script>

</body>
</html>
