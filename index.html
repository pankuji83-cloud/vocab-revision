<script>

// FIREBASE
firebase.initializeApp({
 apiKey:"AIzaSyAdcQ1cKoy-bvyXpfLI89p7AjJNztJ6bKs",
 authDomain:"vocab-revision-a9f9e.firebaseapp.com",
 projectId:"vocab-revision-a9f9e"
});

const auth=firebase.auth();
const db=firebase.firestore();

// STATE
let userId="";
let allWords=[];
let revIndex=0;
let currentWord=null;
let currentAnswer="";
let revInt=null;
let quizRunning=false;
let chart=null; // 🔥 graph fix

// AI MEMORY
const BASE_INTERVAL = 1;
const EASE = 2.5;

// BACKUP
let backupFrequency = localStorage.getItem("backup_freq") || "daily";
let lastBackupTime = localStorage.getItem("last_backup") || 0;

// LOCAL
let xp=Number(localStorage.getItem("xp"))||0;
let streak=Number(localStorage.getItem("streak"))||0;
let lastDate=localStorage.getItem("lastDate")||"";

// AUTH
auth.onAuthStateChanged(u=>{
 if(u){
  userId=u.uid;

  document.getElementById("user").innerText="Logged: "+u.email;

  loginPage.classList.add("hidden");
  appPage.classList.remove("hidden");

  updateStreak();
  updateXP();
  loadWords();

  setInterval(autoBackup,60000);

 }else{
  loginPage.classList.remove("hidden");
  appPage.classList.add("hidden");
 }
});

// AUTH
function signup(){auth.createUserWithEmailAndPassword(email.value,password.value);}
function login(){auth.signInWithEmailAndPassword(email.value,password.value);}
function logout(){auth.signOut();}

// STREAK
function updateStreak(){
 let today=new Date().toDateString();

 if(lastDate!==today){
  if(lastDate===new Date(Date.now()-86400000).toDateString()){
    streak++;
  }else{
    streak=1;
  }
  lastDate=today;
 }

 localStorage.setItem("streak",streak);
 localStorage.setItem("lastDate",lastDate);

 document.getElementById("streak").innerText="🔥 Streak: "+streak;
}

// XP
function updateXP(){
 if(xp<0) xp=0;

 localStorage.setItem("xp",xp);
 document.getElementById("xp").innerText="⭐ XP: "+xp;

 updateGraph(); // 🔥
}

// ADD WORD
async function addWord(){

 let word=wordInput.value.trim().toLowerCase();
 if(!word) return alert("Enter word");

 let mode=document.getElementById("mode").value;

 let existing=await db.collection("users").doc(userId)
 .collection("words").where("word","==",word).get();

 if(!existing.empty) return alert("Already exists");

 let res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
 let data=await res.json();

 let meaning=data[0]?data[0].meanings[0].definitions[0].definition:"No meaning";

 let lang=document.getElementById("lang").value;
 let t=await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|${lang}`);
 let td=await t.json();
 let trans=td.responseData.translatedText;

 let now=Date.now();

 await db.collection("users").doc(userId).collection("words").add({
  word,meaning,trans,mode,
  level:0,
  ease:EASE,
  interval:BASE_INTERVAL,
  nextReview:now
 });

 wordInput.value="";

 meaningBox.innerText=`${cap(word)}\n${meaning}\n${trans}`;

 currentWord={word}; // 🔥 speak fix

 loadWords();

 if(!revInt) toggleRevision();
 if(!quizRunning) toggleQuiz();
}

// LOAD
async function loadWords(){

 let mode=document.getElementById("mode").value;

 let snap=await db.collection("users").doc(userId)
  .collection("words").where("mode","==",mode).get();

 let now=Date.now();

 allWords=[];

 snap.forEach(d=>{
  let w={...d.data(),id:d.id};
  if(!w.nextReview || w.nextReview<=now){
    allWords.push(w);
  }
 });

 updateProgress();
 showRevision();
 generateQuiz();
 aiSuggestion(); // 🔥
}

// PROGRESS
function updateProgress(){
 let strong=allWords.filter(w=>w.level>=3).length;
 let percent=allWords.length?(strong/allWords.length)*100:0;

 document.getElementById("progressBar").style.width=percent+"%";
}

// REVISION
function showRevision(){

 if(!allWords.length){
  output.innerText="🎉 No due words!";
  return;
 }

 let t="";

 for(let i=0;i<Math.min(4,allWords.length);i++){
  let w=allWords[(revIndex+i)%allWords.length];
  t+=`${cap(w.word)}\n${w.meaning}\n${w.trans}\n\n`;
 }

 output.innerText=t;
}

function nextRevision(){
 revIndex=(revIndex+4)%allWords.length;
 showRevision();
}

// QUIZ
function generateQuiz(){

 if(!quizRunning) return;

 if(allWords.length<1){
  quizBox.innerText="No due words";
  return;
 }

 let pool=[...allWords].sort((a,b)=>(a.level||0)-(b.level||0));

 currentWord=pool[0];
 currentAnswer=currentWord.meaning;

 let opts=[currentAnswer];

 while(opts.length<4 && allWords.length>1){
  let r=allWords[Math.floor(Math.random()*allWords.length)].meaning;
  if(!opts.includes(r)) opts.push(r);
 }

 opts.sort(()=>Math.random()-0.5);

 let html=`<h3>${cap(currentWord.word)}</h3>`;

 opts.forEach(o=>{
  html+=`<button onclick="checkAnswer('${o.replace(/'/g,"")}')">${o}</button>`;
 });

 quizBox.innerHTML=html;
}

// CHECK
async function checkAnswer(ans){

 let now=Date.now();

 let ease=currentWord.ease || EASE;
 let interval=currentWord.interval || BASE_INTERVAL;

 if(ans===currentAnswer){
  xp+=10;
  ease+=0.1;
  interval=Math.round(interval*ease);
 }else{
  xp-=5;
  ease-=0.2;
  interval=1;
 }

 if(ease<1.3) ease=1.3;

 let nextReview=now+(interval*86400000);

 updateXP();

 await db.collection("users").doc(userId)
  .collection("words").doc(currentWord.id)
  .update({ease,interval,nextReview});

 loadWords();
}

// PLAY
function toggleRevision(){
 let btn=revBtn;

 if(revInt){
  clearInterval(revInt);
  revInt=null;
  btn.innerText="▶ Start Revision";
 }else{
  revInt=setInterval(nextRevision,10000);
  btn.innerText="⏸ Pause Revision";
 }
}

function toggleQuiz(){
 let btn=quizBtn;

 quizRunning=!quizRunning;

 if(quizRunning){
  generateQuiz();
  btn.innerText="⏸ Pause Quiz";
 }else{
  btn.innerText="▶ Start Quiz";
 }
}

// 🔊 SPEAK
function speakCurrent(){
 if(!currentWord) return;
 let u=new SpeechSynthesisUtterance(currentWord.word);
 speechSynthesis.speak(u);
}

// 🤖 AI SUGGEST
function aiSuggestion(){

 if(!allWords.length){
  aiSuggest.innerText="No data";
  return;
 }

 let weak=allWords.filter(w=>w.level<=1);

 if(weak.length){
  aiSuggest.innerText="🤖 Focus: "+weak.slice(0,3).map(w=>cap(w.word)).join(", ");
 }else{
  aiSuggest.innerText="🔥 All strong!";
 }
}

// 📊 GRAPH
function updateGraph(){

 let history=JSON.parse(localStorage.getItem("xp_history")||"[]");

 history.push(xp);
 if(history.length>10) history.shift();

 localStorage.setItem("xp_history",JSON.stringify(history));

 let ctx=document.getElementById("xpChart");

 if(chart) chart.destroy(); // 🔥 fix

 chart=new Chart(ctx,{
  type:"line",
  data:{
    labels:history.map((_,i)=>i+1),
    datasets:[{
      label:"XP",
      data:history
    }]
  }
 });
}

// BACKUP SYSTEM (same as before)
function setBackupFrequency(freq){
 backupFrequency=freq;
 localStorage.setItem("backup_freq",freq);
 alert("Backup set: "+freq);
}

async function autoBackup(){
 let now=Date.now();
 let diff=now-lastBackupTime;

 if(
 (backupFrequency==="daily" && diff>86400000) ||
 (backupFrequency==="weekly" && diff>604800000) ||
 (backupFrequency==="monthly" && diff>2592000000)
 ){
  let snap=await db.collection("users").doc(userId).collection("words").get();

  let data=[];
  snap.forEach(d=>data.push(d.data()));

  await db.collection("users").doc(userId)
   .collection("backups").add({data,date:now});

  lastBackupTime=now;
  localStorage.setItem("last_backup",now);
 }
}

// HELPERS
function cap(w){return w.charAt(0).toUpperCase()+w.slice(1);}
function toggleDark(){document.body.classList.toggle("dark");}

</script>
