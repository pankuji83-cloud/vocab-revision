<!DOCTYPE html>
<html>
<head>
  <title>Vocab Revision</title>
</head>

<body>

<h1>📘 Vocab Revision</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h3 id="user"></h3>

<!-- ADD WORD -->
<input id="wordInput" placeholder="Enter word">
<button onclick="addWord()">Add Word</button>

<h3 id="output"></h3>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAdcQ1cKoy-bvyXpfLI89p7AjJNztJ6bKs",
  authDomain: "vocab-revision-a9f9e.firebaseapp.com",
  projectId: "vocab-revision-a9f9e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId = "";

// SIGNUP
function signup() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Signup success"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => alert("Login success"))
    .catch(e => alert(e.message));
}

// LOGOUT
function logout() {
  auth.signOut();
}

// USER STATE
auth.onAuthStateChanged(user => {
  if (user) {
    userId = user.uid;
    document.getElementById("user").innerText = "Logged in: " + user.email;
    loadWords();
  } else {
    userId = "";
    document.getElementById("user").innerText = "Not logged in";
  }
});

// ADD WORD
async function addWord() {

  if (!userId) {
    alert("Login first!");
    return;
  }

  let word = document.getElementById("wordInput").value.toLowerCase().trim();

  if (!word) return alert("Enter word!");

  // 🔥 Duplicate check
  let existing = await db.collection("users")
    .doc(userId)
    .collection("words")
    .where("word", "==", word)
    .get();

  if (!existing.empty) {
    alert("Word already exists!");
    return;
  }

  try {
    let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    let data = await res.json();

    if (!data[0]) {
      alert("Invalid word!");
      return;
    }

    let meaning = data[0].meanings[0].definitions[0].definition;
    let example = data[0].meanings[0].definitions[0].example || "No example";

    // 🌍 Hindi translation (simple)
    let transRes = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|hi`);
    let transData = await transRes.json();
    let hindi = transData.responseData.translatedText;

    await db.collection("users").doc(userId).collection("words").add({
      word,
      meaning,
      example,
      hindi
    });

    document.getElementById("output").innerText =
      `${word}\nMeaning: ${meaning}\nHindi: ${hindi}\nExample: ${example}`;

    loadWords();

  } catch (e) {
    alert("Error!");
    console.log(e);
  }
}

// LOAD WORDS
async function loadWords() {
  let snapshot = await db.collection("users").doc(userId).collection("words").get();

  let text = "Your Words:\n\n";

  snapshot.forEach(doc => {
    let d = doc.data();
    text += `${d.word}\nMeaning: ${d.meaning}\nHindi: ${d.hindi}\nExample: ${d.example}\n\n------\n\n`;
  });

  document.getElementById("output").innerText = text;
}
</script>

</body>
</html>
